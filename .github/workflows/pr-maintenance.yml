# yaml-language-server: $schema=https://json.schemastore.org/github-workflow

name: PR maintenance

on:
  pull_request:
    branches: [ "master" ]
    types: [ "opened", "synchronize", "reopened" ]

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
      - run: npm ci
      - run: npm run-script full-check
        env:
          TEST_BOT_TOKEN: ${{ secrets.TEST_BOT_TOKEN }}
          TEST_CHAT_ID: ${{ secrets.TEST_CHAT_ID }}
          TEST_BOT_USERNAME: ${{ secrets.TEST_BOT_USERNAME }}

  assign-to-maintainers:
    name: Assign to maintainers (except for dependabot PRs)
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Assign PR to maintainers
        uses: hkusu/review-assign-action@v1
        with:
          reviewers: 'maintainers,github-copilot[bot]'

      - if: github.actor == 'dependabot[bot]' || github.event.pull_request.user.login == 'dependabot[bot]' # TODO
        run: gh pr merge ${{ github.event.pull_request.number }} --auto --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  enable-auto-merge:
    name: Enable auto-merge for dependabot PRs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
