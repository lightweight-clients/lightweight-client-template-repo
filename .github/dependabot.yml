version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"

    schedule:
      interval: "weekly"
      day: "saturday"
      time: "09:00"

    cooldown:
      default-days: 5
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3

    groups:
      all-safe-deps:
        applies-to: "version-updates"
        patterns:
          - "*"
